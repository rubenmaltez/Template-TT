name: isp_billing
description: App de gestión de clientes y cobros para ISP (Nicaragua) — offline-first con PowerSync.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend / sync
  supabase_flutter: ^2.5.0
  powersync: ^1.10.0

  # State management + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Storage / config
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4

  # UI
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0

  # Geolocalización + mapas (flutter_map + OSM, gratis sin API key)
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Captura de fotos (cliente, comprobante)
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Impresión Bluetooth térmica (57mm / 80mm) — soporta ESC/POS.
  # Sustituye esc_pos_bluetooth (conflicto rxdart con supabase_flutter).
  print_bluetooth_thermal: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
