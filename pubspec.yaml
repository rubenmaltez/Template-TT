name: isp_billing
description: App de gestión de clientes y cobros para ISP (Nicaragua) — offline-first con PowerSync.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend / sync
  supabase_flutter: ^2.5.0
  powersync: ^1.10.0

  # State management + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Storage / config
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4
  # Lee la versión de la app (pubspec version) para anexar al error log
  # y poder correlacionar crashes con builds desplegados.
  package_info_plus: ^8.0.2

  # UI
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  collection: ^1.18.0

  # Geolocalización + mapas (flutter_map + OSM, gratis sin API key)
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Captura de fotos (cliente, comprobante)
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Impresión Bluetooth térmica (57mm / 80mm) — soporta ESC/POS.
  # Sustituye esc_pos_bluetooth (conflicto rxdart con supabase_flutter).
  print_bluetooth_thermal: ^1.1.0
  # Genera comandos ESC/POS (puro Dart, sin platform deps).
  esc_pos_utils_plus: ^2.0.4

  # Acciones del sistema (tel:, geo:, https:)
  url_launcher: ^6.3.0

  # Generación y descarga/impresión de reportes PDF
  pdf: ^3.11.1
  printing: ^5.13.3

  # HTTP client para check de updates (version.json en Storage)
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Empaquetado MSIX para distribución Windows
  msix: ^3.16.8

flutter:
  uses-material-design: true

# Configuración MSIX para distribución Windows.
# Build: flutter build windows --release && dart run msix:create
msix_config:
  display_name: Cobranza ISP
  publisher_display_name: Cobranza ISP
  identity_name: com.cobranzaisp.app
  logo_path: assets/icon/app_icon.png
  capabilities: internetClient
  languages: es
  # Certificado self-signed para distribución B2B (no Microsoft Store).
  # Para producción: reemplazar con certificado comprado.
  store: false
