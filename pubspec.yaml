name: isp_billing
description: App de gestión de clientes y cobros para ISP (Nicaragua) — offline-first con PowerSync.
publish_to: 'none'
version: 0.7.6+076

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend / sync
  supabase_flutter: ^2.5.0
  powersync: ^1.10.0

  # State management + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Storage / config
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4
  # Lee la versión de la app (pubspec version) para anexar al error log
  # y poder correlacionar crashes con builds desplegados.
  package_info_plus: ^8.0.2

  # UI
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  collection: ^1.18.0

  # Geolocalización + mapas (flutter_map + OSM, gratis sin API key)
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Captura de fotos (cliente, comprobante)
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # File picker (documentos PDF/Word del contrato)
  file_picker: ^8.1.2

  # Impresión Bluetooth térmica (57mm / 80mm) — soporta ESC/POS.
  # Sustituye esc_pos_bluetooth (conflicto rxdart con supabase_flutter).
  print_bluetooth_thermal: ^1.1.0
  # Genera comandos ESC/POS (puro Dart, sin platform deps).
  esc_pos_utils_plus: ^2.0.4

  # Acciones del sistema (tel:, geo:, https:)
  url_launcher: ^6.3.0

  # Generación y descarga/impresión de reportes PDF
  pdf: ^3.11.1
  printing: ^5.13.3

  # Decodificar/convertir el logo a raster monocromo para la térmica (ESC/POS)
  # y para procesar imágenes. esc_pos_utils_plus ya la trae transitiva; la
  # declaramos directa para importarla de forma estable.
  image: ^4.0.0

  # Captura un widget Flutter a imagen FUERA de pantalla (al ancho exacto del
  # papel). Se usa para imprimir el recibo: el MISMO widget que se ve en la
  # preview se rasteriza con el motor de Flutter (Skia) → el texto (tildes)
  # sale seguro en cualquier impresora, sin depender de codepages ni PDFium.
  screenshot: ^3.0.0

  # HTTP client para check de updates (version.json en Storage)
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Harness de tests del repo de dinero (pagos_repo): abre una
  # PowerSyncDatabase in-memory/temp sobre el core nativo `powersync-sqlite-core`.
  # `path` arma paths temporales únicos; `sqlite3` carga la extensión nativa en
  # el VM de `flutter test`. Ver test/data/repositories/pagos_repo_test.dart.
  path: ^1.9.0
  sqlite3: ^2.4.0

  # Empaquetado MSIX para distribución Windows
  msix: ^3.16.8

  # Genera iconos de Windows (.ico) y Android (mipmaps) desde un PNG fuente.
  # Correr: dart run flutter_launcher_icons  (tras reemplazar el PNG fuente).
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  # Fuente Unicode embebida para los PDF (recibo + reportes). NotoSans estático
  # subset (Latin + puntuación + símbolos: — – · • € tildes ñ ¿ ¡). Sin esto los
  # PDF usan la Helvetica interna que no tiene glifos para varios símbolos y
  # salen como ⊠. Se carga vía rootBundle en el theme de los documentos.
  assets:
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf

# Configuración MSIX para distribución Windows.
# Build: flutter build windows --release && dart run msix:create
msix_config:
  display_name: SITECSA CRM
  publisher_display_name: SITECSA
  identity_name: com.sitecsa.crm
  logo_path: assets/icon/app_icon.png
  capabilities: internetClient
  languages: es
  # Certificado self-signed para distribución B2B (no Microsoft Store).
  # Para producción: reemplazar con certificado comprado.
  store: false

# Iconos de la app (Windows .ico + Android mipmaps). Fuente: el MISMO PNG que
# usa el MSIX (assets/icon/app_icon.png) — reemplazá ese archivo por el logo
# SITECSA (cuadrado, idealmente 1024x1024 con fondo) y corré:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  windows:
    generate: true
    icon_size: 256


