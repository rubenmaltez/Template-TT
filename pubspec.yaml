name: isp_billing
description: App de gestión de clientes y cobros para ISP (Nicaragua) — offline-first con PowerSync.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend / sync
  supabase_flutter: ^2.5.0
  powersync: ^1.10.0

  # State management
  flutter_riverpod: ^2.5.1

  # Storage / config
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4

  # UI
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

  # Impresoras térmicas Bluetooth (cobradores en campo)
  esc_pos_utils: ^1.1.0
  esc_pos_bluetooth: ^0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
