# PowerSync Sync Rules
# Doc: https://docs.powersync.com/usage/sync-rules
#
# Limitaciones del DSL (importantes a recordar):
#   - NO subqueries (no `WHERE x IN (SELECT ...)`)
#   - NO JOINs en `data:`
#   - Cada query de `data:` debe usar TODOS los parámetros del bucket
#   - `IN` sólo con listas literales: `WHERE estado IN ('pendiente','pagada')`
#
# Por eso `contratos`, `cuotas`, `pagos`, `recibos`, `cargos_extra` y
# `notificaciones_mora` tienen `cobrador_id` denormalizado.

bucket_definitions:

  # ── Catálogos geo globales (compartidos entre tenants) ─────────────────
  # Bucket sin `parameters:` = global. Cualquier usuario autenticado lo baja.
  # Las tablas geo no tienen tenant_id (son catálogos compartidos —
  # Nicaragua es Nicaragua para todos los tenants).
  geografia:
    data:
      - SELECT * FROM departamentos
      - SELECT * FROM municipios
      - SELECT * FROM comunidades

  # ── Catálogo del tenant (planes + settings) ───────────────────────────
  # Todos los empleados del ISP los necesitan offline.
  # Nota: `modulos` / `tenant_modulos` / `tenants` se consultan vía REST
  # desde el panel Super Admin (Sprint A2), no se sincronizan localmente.
  catalogo_tenant:
    parameters: |
      SELECT tenant_id
      FROM cobradores
      WHERE id = request.user_id()
    data:
      - SELECT * FROM planes   WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM settings WHERE tenant_id = bucket.tenant_id

  # ── Datos operativos del cobrador ─────────────────────────────────────
  # Cada cobrador baja SÓLO sus clientes asignados + relacionados.
  # También baja SU PROPIA fila de cobradores (necesita prefijo_recibo para
  # imprimir y rol para validaciones locales).
  por_cobrador:
    parameters: |
      SELECT id AS cobrador_id, tenant_id
      FROM cobradores
      WHERE id = request.user_id() AND rol = 'cobrador'
    data:
      - SELECT id, tenant_id, nombre, telefono, rol, prefijo_recibo, activo
        FROM cobradores
        WHERE tenant_id = bucket.tenant_id AND id = bucket.cobrador_id

      - SELECT * FROM clientes
        WHERE tenant_id = bucket.tenant_id AND cobrador_id = bucket.cobrador_id

      - SELECT * FROM contratos
        WHERE tenant_id = bucket.tenant_id AND cobrador_id = bucket.cobrador_id

      - SELECT * FROM cuotas
        WHERE tenant_id = bucket.tenant_id AND cobrador_id = bucket.cobrador_id

      # Cobrador no necesita pagos/recibos anulados — el saldo de la cuota
      # ya se recalcula via trigger server-side. Filtramos para reducir
      # ruido visual. Admins SÍ los ven (auditoría).
      - SELECT * FROM pagos
        WHERE tenant_id = bucket.tenant_id AND cobrador_id = bucket.cobrador_id
          AND anulado = false

      - SELECT * FROM recibos
        WHERE tenant_id = bucket.tenant_id AND cobrador_id = bucket.cobrador_id
          AND anulado = false

      - SELECT * FROM cargos_extra
        WHERE tenant_id = bucket.tenant_id AND cobrador_id = bucket.cobrador_id

      - SELECT * FROM notificaciones_mora
        WHERE tenant_id = bucket.tenant_id AND cobrador_id = bucket.cobrador_id

      - SELECT * FROM fotos_cliente
        WHERE tenant_id = bucket.tenant_id AND cobrador_id = bucket.cobrador_id

      - SELECT * FROM visitas
        WHERE tenant_id = bucket.tenant_id AND cobrador_id = bucket.cobrador_id

  # ── Vista global para admin (panel web con sync opcional) ──────────────
  todo_tenant_admin:
    parameters: |
      SELECT tenant_id
      FROM cobradores
      WHERE id = request.user_id() AND rol = 'admin'
    data:
      - SELECT * FROM clientes             WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM contratos            WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM cuotas               WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM pagos                WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM recibos              WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM cargos_extra         WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM notificaciones_mora  WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM fotos_cliente        WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM visitas              WHERE tenant_id = bucket.tenant_id
      - SELECT id, tenant_id, nombre, telefono, rol, prefijo_recibo, activo
        FROM cobradores
        WHERE tenant_id = bucket.tenant_id

      - SELECT * FROM audit_log         WHERE tenant_id = bucket.tenant_id

  # ── Vista global para admin_cobranza (mismo dataset que admin) ─────────
  # admin_cobranza ve todo pero sus permisos de escritura los limita RLS.
  todo_tenant_admin_cobranza:
    parameters: |
      SELECT tenant_id
      FROM cobradores
      WHERE id = request.user_id() AND rol = 'admin_cobranza'
    data:
      - SELECT * FROM clientes             WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM contratos            WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM cuotas               WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM pagos                WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM recibos              WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM cargos_extra         WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM notificaciones_mora  WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM fotos_cliente        WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM visitas              WHERE tenant_id = bucket.tenant_id
      - SELECT id, tenant_id, nombre, telefono, rol, prefijo_recibo, activo
        FROM cobradores
        WHERE tenant_id = bucket.tenant_id

      - SELECT * FROM audit_log         WHERE tenant_id = bucket.tenant_id

  # ── Super admin: su propia fila para que la app reconozca el rol ──────
  # El super_admin vive en el tenant 'System' (00000000-...). No tiene
  # datos operativos propios — sólo necesita su fila de cobradores para
  # que el cliente sepa que tiene rol 'super_admin' y muestre el menú
  # admin. El acceso cross-tenant (gestión de tenants/módulos) se hará
  # vía RPCs o vista server-side en Sprint A2, no por sync local.
  super_admin_self:
    parameters: |
      SELECT id AS user_id
      FROM cobradores
      WHERE id = request.user_id() AND rol = 'super_admin'
    data:
      - SELECT id, tenant_id, nombre, telefono, rol, prefijo_recibo, activo
        FROM cobradores
        WHERE id = bucket.user_id

      # Impersonation row: si el super_admin tiene una row activa,
      # la bajamos al SQLite local para que el provider la detecte.
      # user_id es el PK en Postgres pero PowerSync espera `id` — lo
      # aliaseamos. Cuando no hay row, no se baja nada.
      - SELECT user_id AS id, user_id, tenant_id, started_at
        FROM super_admin_impersonation
        WHERE user_id = bucket.user_id

  # ── Impersonación de tenant por super_admin ──────────────────────────
  # Cuando el super_admin tiene una row en super_admin_impersonation,
  # este bucket entrega TODA la data del tenant impersonado (mismos
  # queries que todo_tenant_admin + catalogo_tenant).
  #
  # Cuando no hay impersonación activa, el parameters query retorna 0
  # rows → el bucket está vacío → no descarga nada extra.
  #
  # Al cambiar de tenant (UPDATE impersonation row + disconnect/reconnect
  # PowerSync), el bucket se re-evalúa y entrega la data del nuevo tenant.
  impersonated_tenant:
    parameters: |
      SELECT tenant_id
      FROM super_admin_impersonation
      WHERE user_id = request.user_id()
    data:
      - SELECT * FROM planes             WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM settings           WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM clientes           WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM contratos          WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM cuotas             WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM pagos              WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM recibos            WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM cargos_extra       WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM notificaciones_mora WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM fotos_cliente      WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM visitas            WHERE tenant_id = bucket.tenant_id
      - SELECT id, tenant_id, nombre, telefono, rol, prefijo_recibo, activo
        FROM cobradores
        WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM audit_log          WHERE tenant_id = bucket.tenant_id
